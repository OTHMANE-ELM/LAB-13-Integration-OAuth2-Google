<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --card: #13161e;
            --border: rgba(255,255,255,0.07);
            --accent: #c9f542;
            --accent2: #5b8fff;
            --text: #e8eaf0;
            --muted: #6b7280;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(91,143,255,0.12), transparent 70%);
            top: -150px; left: -150px;
            animation: drift1 9s ease-in-out infinite alternate;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(201,245,66,0.08), transparent 70%);
            bottom: -100px; right: -100px;
            animation: drift2 11s ease-in-out infinite alternate;
        }

        @keyframes drift1 { to { transform: translate(50px, 40px); } }
        @keyframes drift2 { to { transform: translate(-40px, -30px); } }

        .card {
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 56px 60px;
            max-width: 460px;
            width: 90%;
            text-align: center;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.5);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Google icon circle */
        .icon-wrap {
            width: 64px; height: 64px;
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 32px;
            font-size: 28px;
        }

        .label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .label::before, .label::after {
            content: '';
            display: inline-block;
            width: 24px; height: 1px;
            background: var(--border);
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 36px;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-google {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px 24px;
            border-radius: 14px;
            background: var(--accent);
            color: #0d0f14;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            box-shadow: 0 0 0 0 rgba(201,245,66,0);
        }
        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201,245,66,0.25);
            background: #d4f755;
        }
        .btn-google:active {
            transform: translateY(0);
        }

        /* Google SVG logo */
        .google-logo {
            width: 18px; height: 18px;
            flex-shrink: 0;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 12px;
            color: var(--muted);
        }
        .footer-note span {
            color: rgba(201,245,66,0.7);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">🔐</div>

    <div class="label">Authentification</div>

    <h1>Bienvenue</h1>
    <p class="subtitle">Connectez-vous avec votre compte Google pour accéder à votre espace personnel.</p>

    <a href="/oauth2/authorization/google" class="btn-google">
        <svg class="google-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.08-6.08C34.42 3.19 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.22l7.06 5.48C12.4 13.67 17.73 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.69c-.55 2.94-2.2 5.43-4.67 7.1l7.18 5.57C43.44 37.36 46.52 31.38 46.52 24.5z"/>
            <path fill="#FBBC05" d="M10.7 28.3A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.7-4.3L3.14 14.22A23.94 23.94 0 0 0 0 24c0 3.86.93 7.5 2.56 10.72l8.14-6.42z"/>
            <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.5-4.94l-7.18-5.57C28.5 38.1 26.36 38.5 24 38.5c-6.27 0-11.6-4.17-13.3-9.7l-8.14 6.42C6.07 43.52 14.44 47 24 47z"/>
        </svg>
        Se connecter avec Google
    </a>

    <p class="footer-note">Sécurisé par <span>OAuth 2.0</span> · Google Identity</p>
</div>
</body>
</html>
