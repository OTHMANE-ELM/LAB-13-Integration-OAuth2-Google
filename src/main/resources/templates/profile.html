<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Profil Utilisateur</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --card: #13161e;
            --border: rgba(255,255,255,0.07);
            --accent: #c9f542;
            --accent2: #5b8fff;
            --text: #e8eaf0;
            --muted: #6b7280;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(91,143,255,0.15), transparent 70%);
            top: -100px; left: -100px;
            animation: drift1 8s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(201,245,66,0.10), transparent 70%);
            bottom: -80px; right: -80px;
            animation: drift2 10s ease-in-out infinite alternate;
        }

        @keyframes drift1 { to { transform: translate(40px, 30px); } }
        @keyframes drift2 { to { transform: translate(-30px, -20px); } }

        .card {
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 52px;
            max-width: 420px;
            width: 90%;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.5);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .label::before {
            content: '';
            display: inline-block;
            width: 18px; height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .avatar-wrap {
            position: relative;
            width: 88px; height: 88px;
            margin-bottom: 28px;
        }
        .avatar-wrap img {
            width: 88px; height: 88px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2px solid var(--border);
        }
        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;

            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: spin 6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .name {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            line-height: 1.1;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 24px 0 36px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13.5px;
            color: var(--muted);
        }
        .info-row .icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .info-row span.val {
            color: var(--text);
            font-weight: 400;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0 0 28px;
        }

        .btn-logout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255,80,80,0.08);
            border-color: rgba(255,80,80,0.3);
            color: #ff6b6b;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="label">Profil Google</div>

    <div class="avatar-wrap">
        <img th:src="${picture}" alt="Photo de profil"/>
        <div class="avatar-ring"></div>
    </div>

    <div class="name" th:text="${name}">Nom Prénom</div>

    <div class="info">
        <div class="info-row">
            <div class="icon">✉</div>
            <span class="val" th:text="${email}">email@exemple.com</span>
        </div>
        <div class="info-row">
            <div class="icon">🔐</div>
            <span class="val">Connecté via Google OAuth2</span>
        </div>
    </div>

    <hr/>

    <a href="/logout" class="btn-logout">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Se déconnecter
    </a>
</div>
</body>
</html>
